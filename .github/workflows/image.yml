name: image

# Publishes the builder service image (root Dockerfile: pnpm frontend build ->
# uv backend) to ghcr, so the compose stack can PULL it instead of building
# from the sibling checkout. Decoupled from release.yml (the PyPI wheel):
# pushes to main publish `:latest`; a `v*` tag additionally publishes the semver.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".github/workflows/image.yml"
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: compute tags
        run: |
          IMG="ghcr.io/coding-crashkurse/agentplane-builder"
          {
            echo "TAGS<<EOF"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMG}:${GITHUB_REF_NAME#v}"
              echo "${IMG}:latest"
            else
              echo "${IMG}:latest"
              echo "${IMG}:sha-${GITHUB_SHA::7}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.TAGS }}
