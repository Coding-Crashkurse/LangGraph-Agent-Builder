name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: sync (vendored agentplane wheels — pinned platform contract)
        working-directory: backend
        run: uv sync
      - name: lint
        working-directory: backend
        run: |
          uv run ruff check
          uv run ruff format --check
      - name: no eval/exec of user input
        run: |
          ! grep -rnE '(^|[^.a-zA-Z_])(eval|exec)\(' backend/src/langgraph_agent_builder \
            --include='*.py' \
            | grep -v 'exec_module' | grep -v '# grep-ok'
      - name: import-linter (design-time only — no execution frameworks)
        working-directory: backend
        run: uv run lint-imports
      - name: tests (runtime API mocked via respx; round-trip + golden + contract)
        working-directory: backend
        run: uv run pytest tests -q

  quality:
    name: quality (mypy --strict + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: sync
        working-directory: backend
        run: uv sync
      - name: mypy --strict
        working-directory: backend
        run: uv run mypy
      - name: coverage >= 85%
        working-directory: backend
        run: uv run pytest tests -q --cov=langgraph_agent_builder --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: lint + test + build
        working-directory: frontend
        run: |
          pnpm lint
          pnpm test
          pnpm build

  packaging:
    name: packaging (wheel + fresh venv, no Node)
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: build frontend dist
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build
      - name: build wheel (bundles frontend)
        working-directory: backend
        run: uv build --wheel
      - name: assert bundled frontend inside wheel
        run: |
          python -c "
          import glob, zipfile
          wheel = glob.glob('backend/dist/*.whl')[0]
          names = zipfile.ZipFile(wheel).namelist()
          assert any(n.endswith('langgraph_agent_builder/_static/index.html') for n in names), names[:20]
          print('wheel bundles the frontend')
          "
      - name: install into a fresh venv WITHOUT Node and smoke it
        run: |
          uv venv /tmp/fresh
          uv pip install --python /tmp/fresh/bin/python \
            backend/vendor/agentplane_core-0.1.0-py3-none-any.whl \
            backend/vendor/agentplane_sdk-0.1.0-py3-none-any.whl \
            backend/dist/*.whl
          /tmp/fresh/bin/lab version
          BUILDER_HOME=/tmp/builder-home timeout 40 /tmp/fresh/bin/lab serve --port 8765 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8765/api/v1/health && break || sleep 1
          done
          curl -sf http://127.0.0.1:8765/api/v1/health | grep '"status":"ok"'
          curl -sf http://127.0.0.1:8765/api/v1/node-types | grep -q llm_call
