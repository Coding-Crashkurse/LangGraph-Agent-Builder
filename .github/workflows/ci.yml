name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (py${{ matrix.python }}, ${{ matrix.tier }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
        tier: [sqlite, postgres]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: graphforge
          POSTGRES_PASSWORD: graphforge
          POSTGRES_DB: graphforge
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U graphforge"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: sync
        working-directory: backend
        run: uv sync
      - name: lint
        working-directory: backend
        run: |
          uv run ruff check
          uv run ruff format --check
      - name: no eval/exec of user code (SPEC §17)
        run: |
          ! grep -rnE '(^|[^.a-zA-Z_])(eval|exec)\(' backend/src/lga \
            --include='*.py' \
            | grep -v 'exec_module' | grep -v '# grep-ok'
      - name: import-linter (sdk stays lightweight)
        working-directory: backend
        run: uv run lint-imports
      - name: tests
        working-directory: backend
        env:
          # the suite parametrizes tiers itself when 55432 is reachable;
          # the sqlite job simply has no postgres service exposed
          LGA_TEST_TIER: ${{ matrix.tier }}
        run: uv run pytest tests -q
      - name: example matrix
        working-directory: backend
        run: uv run pytest ../examples -q

  quality:
    name: quality (mypy --strict + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: sync
        working-directory: backend
        run: uv sync
      - name: mypy --strict (REFACTOR.md §2/§8)
        working-directory: backend
        run: uv run mypy
      - name: coverage >= 85% on core (REFACTOR.md §4)
        working-directory: backend
        run: uv run pytest tests -q --cov=lga --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: lint + test + build
        working-directory: frontend
        run: |
          pnpm lint
          pnpm test
          pnpm build

  packaging:
    name: packaging (wheel + fresh venv, no Node)
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: build frontend dist
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build
      - name: build wheel (bundles frontend)
        working-directory: backend
        run: uv build --wheel
      - name: assert bundled frontend inside wheel
        run: |
          python -c "
          import glob, zipfile
          wheel = glob.glob('backend/dist/*.whl')[0]
          names = zipfile.ZipFile(wheel).namelist()
          assert any(n.endswith('lga/_static/index.html') for n in names), names[:20]
          print('wheel bundles the frontend ✔')
          "
      - name: install into a fresh venv WITHOUT Node and smoke it (SPEC §15.6)
        run: |
          uv venv /tmp/fresh
          uv pip install --python /tmp/fresh/bin/python backend/dist/*.whl
          /tmp/fresh/bin/lga version
          /tmp/fresh/bin/lga init /tmp/ws
          test -f /tmp/ws/.env
          /tmp/fresh/bin/lga flow validate examples/01_hello_flow/flow.json
          LGA_HOME=/tmp/lga-home timeout 40 /tmp/fresh/bin/lga run --port 8765 --no-open &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8765/api/v1/health && break || sleep 1
          done
          curl -sf http://127.0.0.1:8765/api/v1/health | grep '"status":"ok"'
      - name: uvx from wheel
        run: uvx --from backend/dist/*.whl lga version
