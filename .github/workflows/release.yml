name: release

# Works like the agentplane release: the version that gets published is exactly
# the `version` in backend/pyproject.toml — bump it there, commit, then push a
# `v*` tag (or run this workflow manually). Versions already on PyPI are skipped
# (skip-existing), so re-running a tag is a no-op instead of an error.
#
# The wheel BUNDLES the built frontend (hatch hook needs the Node toolchain), so
# an sdist is never published — the universal wheel is the installable artifact.
# Auth is PyPI Trusted Publishing (OIDC): no token. The trusted-publisher config
# is keyed to (repo, this workflow filename, environment `pypi`) — do not rename
# either without updating the pending publisher on PyPI.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: backend gates (ruff, mypy, import-linter, pytest)
        working-directory: backend
        run: |
          uv sync
          uv run ruff format --check
          uv run ruff check
          uv run lint-imports
          uv run mypy
          uv run pytest tests -q

      - name: frontend gates (lint, test, build)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm test
          pnpm build

  publish:
    needs: gates
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (no token needed)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: build frontend (bundled into the wheel)
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: build wheel (from backend/pyproject version)
        working-directory: backend
        run: |
          VERSION="$(uv version --short)"
          echo "publishing langgraph-agent-builder $VERSION (from pyproject.toml)"
          uv build --wheel

      - name: publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist
          skip-existing: true
