name: release

# NOTE (agentplane pivot): the wheel depends on agentplane-core/-sdk ==0.1.0.
# A PyPI release of the builder requires those platform packages on PyPI
# first — until then this workflow can only publish to an index that also
# carries the agentplane wheels.

# Manueller Trigger = die "Release-Flag". Es wird NUR gebaut/veröffentlicht,
# wenn du in GitHub → Actions → "release" → "Run workflow" klickst.
#   bump = none   → veröffentlicht die AKTUELLE Version unverändert (z. B. erster Release)
#   bump = patch (Standard)  → x.y.Z+1   (automatisch)
#   bump = minor  → x.Y+1.0  (manuell wählen)
#   bump = major  → X+1.0.0  (manuell wählen)
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        default: patch
        options: [none, patch, minor, major]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (kein Token nötig) — SPEC §2.5
      contents: write # Version-Commit + Tag + GitHub-Release zurückpushen
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle History für Changelog + Tags

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: bump version
        id: bump
        working-directory: backend
        run: |
          if [ "${{ inputs.bump }}" != "none" ]; then
            uv version --bump "${{ inputs.bump }}" --no-sync
          fi
          NEW="$(uv version --short)"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Neue Version: $NEW"

      - name: build frontend (wird in die Wheel gebündelt)
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: build wheel + sdist
        working-directory: backend
        run: uv build

      - name: publish to PyPI (Trusted Publishing)
        working-directory: backend
        run: uv publish

      - name: commit version bump + tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pyproject.toml backend/uv.lock 2>/dev/null || git add backend/pyproject.toml
          git commit -m "release: v${{ steps.bump.outputs.version }}" || echo "no version change to commit"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags

      - name: changelog aus conventional commits
        run: |
          PREV=$(git describe --tags --abbrev=0 "v${{ steps.bump.outputs.version }}^" 2>/dev/null || echo "")
          git log ${PREV:+$PREV..}HEAD --pretty='- %s' > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          body_path: RELEASE_NOTES.md
