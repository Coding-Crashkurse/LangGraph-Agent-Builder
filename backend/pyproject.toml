[project]
name = "graphforge"
version = "0.1.0"
description = "Visual builder for LangGraph agent workflows, published as A2A and MCP servers."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sse-starlette>=2.1",
    "langgraph>=0.6",
    "langgraph-checkpoint-postgres>=2.0",
    "langchain-core>=0.3",
    "langchain>=0.3",
    "langchain-openai>=0.2",
    "langchain-postgres>=0.0.12",
    "langchain-text-splitters>=0.3",
    "langchain-mcp-adapters>=0.1",
    # Pinned to the 0.3 line: CLAUDE.md §9 (executor mapping, A2AStarletteApplication,
    # TaskUpdater, DatabaseTaskStore) is written against protocol v0.3. a2a-sdk 1.x
    # implements protocol v1.0 with a rewritten server API — bumping requires a §9 redesign.
    "a2a-sdk[http-server,sql]>=0.3,<0.4",
    "mcp>=1.9",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "psycopg[binary]>=3.2",
    "psycopg-pool>=3.2",
    "alembic>=1.13",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "python-ulid>=2.7",
    "python-multipart>=0.0.18",
    "httpx>=0.27",
    "watchfiles>=0.24",
]

[project.scripts]
graphforge = "graphforge.cli:main"

[dependency-groups]
dev = [
    "ruff>=0.8",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["uv_build>=0.9"]
build-backend = "uv_build"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "ASYNC", "RUF"]
ignore = ["RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
# Component metadata lists are ClassVars declared on BaseComponent; overriding
# them in subclasses without re-annotating is the component-DSL convention.
"src/graphforge/components/**" = ["RUF012"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pydantic.PydanticDeprecatedSince20",
]
